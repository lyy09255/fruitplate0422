<script>
    const apiKey = "AIzaSyBwzzykj7kO7SByjtMWDredgGwaOPCahTA"; 
    let scene, camera, renderer, controls, shadowCatcher;
    let bowlGroup, shellMesh; 
    let ambientLight, topLight, keyLight;
    let currentTab = '3d';

    // 初始状态配置
    const bowlState = {
        segments: 8,
        complexity: 3,
        spike: 0.5,
        height: 1.2,
        gapSize: 0.05, 
        scale: 1.0,
        color: '#d1d5db', // 浅灰色
        metalness: 0.33,  // 金属感 0.33
        transmission: 0.0, // 玻璃感 0
        roughness: 0.15,  // 粗糙度 0.15
        lighting: 'day'   // 日间模式
    };

    const lightConfigs = {
        day: { bg: 0xfdfdfd, ambient: [0xffffff, 0.7], top: [0xffffff, 1.2], catcher: 0.08 },
        night: { bg: 0x1a1a1a, ambient: [0x223344, 0.3], top: [0x7788ff, 0.6], catcher: 0.4 },
        warm: { bg: 0xfaf9f6, ambient: [0xfff5e6, 0.6], top: [0xffcc88, 1.5], catcher: 0.12 },
        cold: { bg: 0xf4f7f8, ambient: [0xe6f5ff, 0.5], top: [0x88ccff, 1.2], catcher: 0.15 }
    };

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }

    function initThree() {
        const container = document.getElementById('canvas-container');
        if (!container) return;
        scene = new THREE.Scene();
        scene.background = new THREE.Color(lightConfigs.day.bg); 
        camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(6, 6, 10);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2;
        
        const catcherGeo = new THREE.PlaneGeometry(50, 50);
        const catcherMat = new THREE.ShadowMaterial({ opacity: lightConfigs.day.catcher });
        shadowCatcher = new THREE.Mesh(catcherGeo, catcherMat);
        shadowCatcher.rotation.x = -Math.PI / 2;
        shadowCatcher.position.y = -0.05;
        shadowCatcher.receiveShadow = true;
        scene.add(shadowCatcher);
        
        ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        topLight = new THREE.DirectionalLight(0xffffff, 1.2);
        topLight.position.set(5, 15, 5);
        topLight.castShadow = true;
        topLight.shadow.mapSize.set(2048, 2048);
        scene.add(topLight);
        keyLight = new THREE.PointLight(0xffffff, 0.8);
        keyLight.position.set(-10, 10, 10);
        scene.add(keyLight);
        
        createBowl();
        animate();
        bindUI();
        updateLighting('day'); // 初始化日间模式
        window.addEventListener('resize', onWindowResize);
    }

    function getShrinkedTriangle(p1, p2, p3, gap) {
        if (gap <= 0) return [p1, p2, p3];
        const cx = (p1.x + p2.x + p3.x) / 3;
        const cy = (p1.y + p2.y + p3.y) / 3;
        const cz = (p1.z + p2.z + p3.z) / 3;
        const f = 1.0 - gap;
        return [
            new THREE.Vector3(cx + (p1.x - cx)*f, cy + (p1.y - cy)*f, cz + (p1.z - cz)*f),
            new THREE.Vector3(cx + (p2.x - cx)*f, cy + (p2.y - cy)*f, cz + (p2.z - cz)*f),
            new THREE.Vector3(cx + (p3.x - cx)*f, cy + (p3.y - cy)*f, cz + (p3.z - cz)*f)
        ];
    }

    function getShrinkedQuad(p1, p2, p3, p4, gap) {
        if (gap <= 0) return [p1, p2, p3, p4];
        const cx = (p1.x + p2.x + p3.x + p4.x) / 4;
        const cy = (p1.y + p2.y + p3.y + p4.y) / 4;
        const cz = (p1.z + p2.z + p3.z + p4.z) / 4;
        const f = 1.0 - gap;
        return [
            new THREE.Vector3(cx + (p1.x - cx)*f, cy + (p1.y - cy)*f, cz + (p1.z - cz)*f),
            new THREE.Vector3(cx + (p2.x - cx)*f, cy + (p2.y - cy)*f, cz + (p2.z - cz)*f),
            new THREE.Vector3(cx + (p3.x - cx)*f, cy + (p3.y - cy)*f, cz + (p3.z - cz)*f),
            new THREE.Vector3(cx + (p4.x - cx)*f, cy + (p4.y - cy)*f, cz + (p4.z - cz)*f)
        ];
    }

    function createBowl() {
        if (bowlGroup) {
            scene.remove(bowlGroup);
            bowlGroup.traverse(c => { 
                if(c.geometry) c.geometry.dispose(); 
                if(c.material) c.material.dispose(); 
            });
        }
        bowlGroup = new THREE.Group();

        const { segments, complexity, spike, height, scale, gapSize } = bowlState;
        const verticesShell = []; 
        const uvsShell = [];

        const getPoint = (ringIndex, segmentIndex) => {
            const angle = (segmentIndex / segments) * Math.PI * 2;
            const ringRatio = ringIndex / complexity;
            let radius = ringRatio * 3.2;
            if (segmentIndex % 2 !== 0) radius *= (1.0 - spike * ringRatio);
            else radius *= (1.0 + spike * 0.2 * ringRatio);
            const y = Math.pow(ringRatio, 1.4) * height;
            return new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
        };

        const center = new THREE.Vector3(0, 0, 0);
        for (let r = 0; r < complexity; r++) {
            for (let s = 0; s < segments; s++) {
                const sNext = (s + 1) % segments;
                if (r === 0) {
                    const p1 = getPoint(r + 1, s);
                    const p2 = getPoint(r + 1, sNext);
                    const [sc, sp1, sp2] = getShrinkedTriangle(center, p1, p2, gapSize);
                    verticesShell.push(sc.x, sc.y, sc.z, sp1.x, sp1.y, sp1.z, sp2.x, sp2.y, sp2.z);
                    uvsShell.push(0.5, 0.5, 0, 0, 1, 0);
                } else {
                    const b1 = getPoint(r, s);
                    const b2 = getPoint(r, sNext);
                    const t1 = getPoint(r + 1, s);
                    const t2 = getPoint(r + 1, sNext);
                    const [sb1, sb2, st2, st1] = getShrinkedQuad(b1, b2, t2, t1, gapSize);
                    verticesShell.push(sb1.x, sb1.y, sb1.z, st1.x, st1.y, st1.z, sb2.x, sb2.y, sb2.z);
                    uvsShell.push(0, 0, 0, 1, 1, 0);
                    verticesShell.push(st1.x, st1.y, st1.z, st2.x, st2.y, st2.z, sb2.x, sb2.y, sb2.z);
                    uvsShell.push(0, 1, 1, 1, 1, 0);
                }
            }
        }

        const shellGeo = new THREE.BufferGeometry();
        shellGeo.setAttribute('position', new THREE.Float32BufferAttribute(verticesShell, 3));
        shellGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvsShell, 2));
        shellGeo.computeVertexNormals();

        const material = new THREE.MeshPhysicalMaterial({
            color: bowlState.color,
            metalness: bowlState.transmission > 0 ? 0.05 : bowlState.metalness,
            roughness: bowlState.roughness,
            transmission: bowlState.transmission,
            transparent: true,
            thickness: 0.8,
            ior: 1.52,
            side: THREE.DoubleSide,
            flatShading: true,
            envMapIntensity: 2.2
        });
        shellMesh = new THREE.Mesh(shellGeo, material);
        shellMesh.castShadow = true;
        shellMesh.receiveShadow = true;
        bowlGroup.add(shellMesh);
        bowlGroup.scale.set(scale, scale, scale);
        scene.add(bowlGroup);
    }

    function switchTab(tab) {
        currentTab = tab;
        const canvas = document.getElementById('canvas-container');
        const imgArea = document.getElementById('image-display-area');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const activeTab = document.getElementById(`tab-${tab}`);
        if (activeTab) activeTab.classList.add('active');
        if(tab === '3d') {
            canvas.style.display = 'block';
            imgArea.classList.add('hidden');
        } else {
            canvas.style.display = 'none';
            imgArea.classList.remove('hidden');
        }
    }

   async function generateRealScene() {
        if (!renderer || !camera || !scene) return;
        
        const loading = document.getElementById('loading-overlay');
        const renderImg = document.getElementById('real-scene-render');
        const placeholder = document.getElementById('render-placeholder');
        
        // 显示加载动画
        if (loading) loading.style.display = 'flex';

        // 1. 侧视图捕捉逻辑
        const originalPos = camera.position.clone();
        const originalBg = scene.background.clone();
        scene.background.set(0xeeeeee); 
        camera.position.set(11, 3.5, 0);
        camera.lookAt(0, 1, 0);
        renderer.render(scene, camera);
        const base64Image = renderer.domElement.toDataURL('image/png').split(',')[1];
        
        // 恢复场景
        camera.position.copy(originalPos);
        scene.background.copy(originalBg);
        if (controls) controls.update();
        renderer.render(scene, camera);
        
        // 切换到实景标签页看结果
        switchTab('real');

        const colorDesc = bowlState.color === '#d1d5db' ? "soft light gray" : "custom color";
        const gapHint = bowlState.gapSize > 0 ? "The object has clear hollow gaps between panels. " : "";
        const prompt = `A professional commercial product photograph in a zen-like MUJI interior. 
        TASK: PLACE THIS EXACT FRUIT BOWL OBJECT into a minimalist sunlight kitchen.
        MANDATORY COLOR: The fruit bowl MUST remain exactly ${colorDesc} (#${bowlState.color.replace('#','')}). 
        DETAILS: Preserve the star origami shape and its side-view perspective. ${gapHint}
        CONTENT: Filled with multiple fresh fruits (apples, lemons).
        SCENE: On a light wood table, soft natural light, photorealistic, 8k, simple clean background.`;

        try {
            // 发起请求
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [ { text: prompt }, { inlineData: { mimeType: "image/png", data: base64Image } } ] }],
                    generationConfig: { responseModalities: ['IMAGE'] }
                })
            });

            const data = await response.json();

            // --- 新增诊断逻辑：如果 API 返回错误 ---
            if (data.error) {
                alert("❌ API 报错：\n" + data.error.message);
                return;
            }

            const generatedBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
            
            if (generatedBase64) {
                renderImg.src = `data:image/png;base64,${generatedBase64}`;
                renderImg.classList.remove('hidden');
                if (placeholder) placeholder.classList.add('hidden');
            } else {
                alert("⚠️ 未获取到图像数据，请检查 API 额度或重试。");
            }
        } catch (e) {
            // --- 新增诊断逻辑：如果网络连接失败 ---
            alert("❌ 网络请求失败！\n原因：" + e.message + "\n\n请检查：\n1. 科学上网是否开启【全局模式】。\n2. 节点是否为美国或新加坡。");
            console.error("Rendering error:", e);
        } finally {
            if (loading) loading.style.display = 'none';
        }
    }

    function bindUI() {
        const inputs = ['segments', 'spike', 'complexity', 'height', 'gapSize', 'metalness', 'transmission', 'roughness'];
        inputs.forEach(key => {
            const el = document.getElementById('input-' + key);
            if(!el) return;
            el.oninput = (e) => {
                const isInt = key === 'segments' || key === 'complexity';
                const val = isInt ? parseInt(e.target.value) : parseFloat(e.target.value);
                bowlState[key] = val;
                document.getElementById('val-' + key).innerText = isInt ? val : val.toFixed(2);
                if(['metalness', 'transmission', 'roughness'].includes(key)) {
                    if(shellMesh && shellMesh.material) {
                        shellMesh.material.metalness = bowlState.transmission > 0 ? 0.05 : bowlState.metalness;
                        shellMesh.material.roughness = bowlState.roughness;
                        shellMesh.material.transmission = bowlState.transmission;
                        shellMesh.material.transparent = true;
                        shellMesh.material.needsUpdate = true;
                    }
                } else createBowl();
            };
        });
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            if (input.value.trim()) { addChatMessage(input.value, 'user'); callGemini(input.value); input.value = ''; }
        };
    }

    function updateColor(hex) {
        bowlState.color = hex;
        if(shellMesh && shellMesh.material) shellMesh.material.color.set(hex);
        document.getElementById('colorPicker').value = hex;
    }

    function updateLighting(preset) {
        if (!scene || !ambientLight || !topLight) return;
        const config = lightConfigs[preset];
        scene.background.setHex(config.bg);
        ambientLight.intensity = config.ambient[1];
        topLight.intensity = config.top[1];
        if (shadowCatcher) shadowCatcher.material.opacity = config.catcher;
        document.querySelectorAll('.light-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-light-${preset}`);
        if (activeBtn) activeBtn.classList.add('active');
    }

    async function callGemini(text) {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'flex';
        const systemPrompt = `Parametric 3D designer AI. Respond JSON. EVEN segments 4-24. JSON: {"segments":x, "spike":x, "complexity":x, "height":x, "gapSize":x, "color":x, "metalness":x, "transmission":x, "roughness":x, "reply":"Short Chinese"}`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
            });
            const result = await response.json();
            const params = JSON.parse(result.candidates[0].content.parts[0].text);
            Object.assign(bowlState, params);
            const keys = ['segments', 'spike', 'complexity', 'height', 'gapSize', 'metalness', 'transmission', 'roughness'];
            keys.forEach(k => {
                const input = document.getElementById('input-' + k);
                const valDisplay = document.getElementById('val-' + k);
                if(input) input.value = bowlState[k];
                if(valDisplay) valDisplay.innerText = (k === 'segments' || k === 'complexity') ? bowlState[k] : bowlState[k].toFixed(2);
            });
            document.getElementById('colorPicker').value = bowlState.color;
            createBowl();
            addChatMessage(params.reply || "已为您调整参数。", 'ai');
        } catch (e) {} finally { if (overlay) overlay.style.display = 'none'; }
    }

    function addChatMessage(text, role) {
        const hist = document.getElementById('chatHistory');
        if (!hist) return;
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        div.innerText = text;
        hist.appendChild(div);
        hist.scrollTop = hist.scrollHeight;
    }

    function onWindowResize() {
        const container = document.getElementById('canvas-container');
        if (!container || !camera || !renderer) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    window.onload = initThree;
</script>

</body></html>
